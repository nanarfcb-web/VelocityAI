services:
  - type: web
    name: quantum-dub-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

  - type: worker
    name: dubbing-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py